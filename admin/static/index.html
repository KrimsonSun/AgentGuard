<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentGuard Admin</title>
<style>
  :root { color-scheme: light dark; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body { margin: 0 auto; max-width: 960px; padding: 20px 16px 60px; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; } h1 span { opacity: .5; font-weight: 400; font-size: .85rem; }
  .tabs { display: flex; gap: 6px; margin: 14px 0; border-bottom: 1px solid #8884; }
  .tab { padding: 8px 16px; cursor: pointer; border: none; background: none; font-size: .95rem; color: inherit;
         border-bottom: 2px solid transparent; border-radius: 8px 8px 0 0;
         transition: color .2s ease, border-color .25s ease, background .2s ease; }
  .tab:hover { background: color-mix(in srgb, seagreen 8%, transparent); }
  .tab.on { border-bottom-color: seagreen; color: seagreen; font-weight: 600; }
  .panel { display: none; } .panel.on { display: block; animation: panelIn .3s cubic-bezier(.33,.05,.2,1); }
  @keyframes panelIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .card { padding: 10px 14px; border-radius: 10px; background: color-mix(in srgb, seagreen 12%, transparent);
          border: 1px solid seagreen; margin: 10px 0; }
  .bar { display: flex; gap: 8px; margin: 12px 0; }
  input, select { padding: 8px 12px; border-radius: 8px; border: 1px solid #8884; font-size: .95rem; background: Canvas; color: inherit; }
  input[type=search], input.grow { flex: 1; }
  table { width: 100%; border-collapse: collapse; font-size: .86rem; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #8883; vertical-align: top; }
  th { position: sticky; top: 0; background: Canvas; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.id, .mono { font-family: ui-monospace, monospace; font-size: .82rem; word-break: break-all; }
  button.act { padding: 4px 12px; border-radius: 7px; border: 1px solid seagreen; background: transparent; color: seagreen; cursor: pointer; }
  button.act:hover { background: seagreen; color: white; }
  tr.active td { background: color-mix(in srgb, seagreen 10%, transparent); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; } .chip { padding: 2px 9px; border-radius: 12px; background: #8882; font-size: .8rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; }
  .kpi { text-align: center; padding: 10px; border-radius: 10px; border: 1px solid #8884; }
  .kpi b { display: block; font-size: 1.5rem; color: seagreen; }
  details summary { cursor: pointer; opacity: .7; font-size: .8rem; }
  .tl { font-family: ui-monospace, monospace; font-size: .8rem; line-height: 1.7; white-space: pre-wrap; }
  .ev-tool_call { color: #d08000; } .ev-tool_result { opacity: .6; } .ev-user_utterance { color: seagreen; }
  .ev-greeting, .ev-hangup { opacity: .55; } .lat { color: #c04a6e; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: seagreen; color: #fff; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity .3s; }
  #chatlog { min-height: 240px; max-height: 55vh; overflow-y: auto; padding: 6px 2px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 82%; padding: 9px 13px; border-radius: 12px; font-size: .92rem; line-height: 1.5; white-space: pre-wrap; }
  .msg.u { align-self: flex-end; background: seagreen; color: #fff; border-bottom-right-radius: 3px; }
  .msg.a { align-self: flex-start; background: #8882; border-bottom-left-radius: 3px; }
  .confirm { align-self: flex-start; max-width: 82%; padding: 11px 14px; border-radius: 12px; border: 1px solid #e8a302; background: color-mix(in srgb, #e8a302 14%, transparent); }
  .confirm .btns { display: flex; gap: 8px; margin-top: 9px; }
  .confirm button { padding: 5px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: .9rem; }
  .confirm .yes { background: seagreen; color: #fff; } .confirm .no { background: #8883; color: inherit; }
  .msg.a.cursor::after { content: "▋"; margin-left: 1px; opacity: .55; animation: blink .9s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .typing { align-self: flex-start; background: #8882; border-radius: 12px; border-bottom-left-radius: 3px; padding: 12px 14px; display: inline-flex; gap: 5px; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .45; animation: bounce 1.1s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .18s; } .typing i:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce { 0%,70%,100% { transform: translateY(0); opacity: .35; } 35% { transform: translateY(-5px); opacity: .85; } }
  @media (prefers-reduced-motion: reduce) { .panel.on, .fcard.fresh, .typing i, .msg.a.cursor::after { animation: none; } }
  .choose { align-self: flex-start; max-width: 90%; padding: 11px 14px; border-radius: 12px; border: 1px solid #0891b2; background: color-mix(in srgb, #0891b2 12%, transparent); animation: panelIn .25s ease; }
  .choose .opts { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
  .choose .opt { text-align: left; padding: 9px 12px; border-radius: 9px; border: 1px solid #0891b2; background: Canvas; color: inherit; cursor: pointer; display: flex; flex-direction: column; gap: 3px; transition: background .15s ease, transform .05s ease; }
  .choose .opt:hover { background: color-mix(in srgb, #0891b2 16%, transparent); }
  .choose .opt:active { transform: scale(.99); }
  .choose .opt-name { font-weight: 600; }
  .choose .opt-sub { font-size: .8rem; opacity: .78; font-family: ui-monospace, monospace; }
  .feedgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 12px; }
  .fcard { border: 1px solid seagreen; border-radius: 12px; padding: 12px 14px; background: color-mix(in srgb, seagreen 8%, transparent); position: relative; }
  .fcard.fresh { animation: pop .55s ease; box-shadow: 0 0 0 2px seagreen inset; }
  @keyframes pop { from { transform: scale(.96); opacity: .3; } }
  .fcard .plate { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; font-family: ui-monospace, monospace; }
  .fcard .who { color: seagreen; font-weight: 600; margin: 3px 0; }
  .fcard .meta { font-size: .85rem; opacity: .8; line-height: 1.6; }
  .fcard .foot { display: flex; justify-content: space-between; margin-top: 8px; font-size: .78rem; opacity: .7; }
  .fcard .sla { color: #1a7a3a; font-weight: 600; } .fcard .sla.slow { color: #c04a6e; }
  .badge-new { position: absolute; top: -8px; right: 10px; background: seagreen; color: #fff; font-size: .7rem; padding: 1px 8px; border-radius: 10px; }
  .feedhead { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin: 2px 0 6px; font-size: .9rem; }
  .feedhead b { font-size: 1rem; color: seagreen; }
  .fcard.pending { box-shadow: 0 0 0 2px #e8a302 inset; }
  .badge-pending { position: absolute; top: -9px; left: 10px; background: #e8a302; color: #3a2c00; font-size: .72rem; font-weight: 700; padding: 1px 9px; border-radius: 10px; }
  .fcard .rel { margin-top: 9px; }
  .fcard .rel button { width: 100%; padding: 7px; border-radius: 8px; border: none; background: #e8a302; color: #3a2c00; font-weight: 700; font-size: .95rem; cursor: pointer; }
  .fcard .rel button:hover { filter: brightness(1.08); }
  .fcard .released { margin-top: 9px; color: #1a7a3a; font-size: .82rem; font-weight: 600; }
  #gate { max-width: 380px; margin: 48px auto; }
  .authcard { border: 1px solid seagreen; border-radius: 14px; padding: 24px; text-align: center; }
  .authcard h2 { font-size: 1.15rem; margin: 0 0 4px; }
  .authcard input { width: 100%; box-sizing: border-box; margin: 8px 0; text-align: center; font-size: 1.05rem; letter-spacing: 1px; }
  .authcard button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: seagreen; color: #fff; font-size: 1rem; cursor: pointer; margin-top: 6px; }
  .authcard .hint { opacity: .65; font-size: .82rem; margin-top: 10px; line-height: 1.6; }
  .authcard img.qr { width: 200px; height: 200px; margin: 12px auto 4px; display: block; }
  .autherr { color: #c04a6e; font-size: .85rem; min-height: 1.1em; }
</style>
</head>
<body>
<h1>🐳 AgentGuard Admin <span id="userbar" hidden style="font-size:.8rem;font-weight:400"></span></h1>

<!-- 未登录：登录 / 首次初始化（由 JS 填充） -->
<div id="gate"></div>

<!-- 已登录：控制台 -->
<div id="app" hidden>
<div class="tabs">
  <button class="tab" data-p="model">模型切换</button>
  <button class="tab" data-p="visitor">访客查询</button>
  <button class="tab on" data-p="feed">📟 值守台</button>
  <button class="tab" data-p="chat">🐳 门卫台</button>
  <button class="tab" data-p="trace">通话 Trace</button>
  <button class="tab" id="tab-admins" data-p="admins" hidden>👤 账号管理</button>
</div>

<!-- ===== 模型 ===== -->
<div class="panel" id="p-model">
  <div class="card">当前模型：<b id="curModel" class="mono">…</b> <span id="fallback" style="opacity:.55"></span></div>
  <div class="bar">
    <input type="search" id="mq" class="grow" placeholder="搜索模型 id / 名称，如 qwen、flash…">
    <select id="msort">
      <option value="prompt_1m">按读价</option><option value="completion_1m">按写价</option>
      <option value="context">按上下文</option><option value="id">按 id</option>
    </select>
  </div>
  <table><thead><tr><th>模型</th><th class="num">上下文</th><th class="num">读$/1M</th><th class="num">写$/1M</th><th></th></tr></thead>
    <tbody id="mrows"></tbody></table>
</div>

<!-- ===== 访客查询 ===== -->
<div class="panel" id="p-visitor">
  <div class="bar">
    <input id="ask" class="grow" placeholder="问点啥：本周多少车？张师傅这个月来了几次？哪个时段最多？">
    <button class="act" onclick="doAsk()">问</button>
  </div>
  <div class="card" id="askAns" style="display:none"></div>
  <div id="stats" class="grid"></div>
  <div class="bar"><input type="search" id="vq" class="grow" placeholder="按车牌/单位/称呼/手机号 搜索访问记录"></div>
  <table><thead><tr><th>入场时间</th><th>车牌</th><th>单位</th><th>事由</th><th>称呼</th><th>手机</th></tr></thead>
    <tbody id="vrows"></tbody></table>
</div>

<!-- ===== 值守台（保安接收面·默认首页）===== -->
<div class="panel on" id="p-feed">
  <div class="feedhead">
    <div>📞 当前来电号码 <b id="phonenum" class="mono">…</b></div>
    <button class="act" onclick="manualRelease()">🔓 手动放行</button>
  </div>
  <div style="opacity:.6;font-size:.82rem;margin:4px 0 10px">🟢 实时刷新（每 3 秒）· 新登记即刻请求放行 · ⏱ = 接通→保安送达耗时（25s SLA）</div>
  <div id="feedcards" class="feedgrid"></div>
</div>

<!-- ===== 门卫台 ===== -->
<div class="panel" id="p-chat">
  <div id="chatlog"><div class="msg a">您好，我是门卫台助手 🐳 可以问我「张师傅这个月来了几次」，也能让我改访客信息、合并被车牌听花拆开的同一个人（改动会先请您确认再落库）。</div></div>
  <div class="bar">
    <input id="chatin" class="grow" placeholder="对话式查询/维护：张师傅来了几次？ / 把 #1 手机改成… / 合并重复的张师傅">
    <button class="act" onclick="chatSend()">发送</button>
  </div>
  <div style="opacity:.5;font-size:.8rem">读操作即时执行；改 / 合并会先弹确认再落库（HITL 人工闸门）。</div>
</div>

<!-- ===== Trace ===== -->
<div class="panel" id="p-trace">
  <div class="bar"><select id="callsel" onchange="loadTrace(this.value)"><option>加载中…</option></select>
    <button class="act" onclick="loadCalls()">刷新</button></div>
  <div class="tl" id="tl">选择一通电话查看完整推理/行为 trace。</div>
</div>

<!-- ===== 账号管理（仅根管理员）===== -->
<div class="panel" id="p-admins">
  <div class="bar"><input id="newadmin" class="grow" placeholder="新管理员用户名"><button class="act" onclick="createAdmin()">建号</button></div>
  <div id="newqr"></div>
  <h3 style="font-size:.95rem;margin:16px 0 4px">管理员</h3>
  <table><thead><tr><th>用户名</th><th>角色</th><th>状态</th><th></th></tr></thead><tbody id="adminrows"></tbody></table>
  <h3 style="font-size:.95rem;margin:16px 0 4px">在线会话</h3>
  <table><thead><tr><th>用户</th><th>登录</th><th>过期</th><th></th></tr></thead><tbody id="sessrows"></tbody></table>
</div>
</div><!-- /#app -->

<div id="toast"></div>
<script>
const $ = id => document.getElementById(id);
const esc = s => (s??"").toString().replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2600);}
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); $("p-"+t.dataset.p).classList.add("on");
  stopFeed(); stopTyper();
  if (t.dataset.p==="visitor") loadStats();
  if (t.dataset.p==="trace") loadCalls();
  if (t.dataset.p==="feed") startFeed();
  if (t.dataset.p==="admins") loadAdmins();
});

/* ---- 模型 ---- */
let models=[], current="";
async function loadCfg(){const c=await(await fetch("/api/config")).json();current=c.model;$("curModel").textContent=c.model;$("fallback").textContent="（.env 兜底："+c.env_fallback+"）";}
async function loadModels(){models=(await(await fetch("/api/models")).json()).data;renderModels();}
function renderModels(){const q=$("mq").value.toLowerCase(),k=$("msort").value;
  $("mrows").innerHTML=models.filter(m=>!q||m.id.toLowerCase().includes(q)||m.name.toLowerCase().includes(q))
   .sort((a,b)=>k==="id"?a.id.localeCompare(b.id):k==="context"?b[k]-a[k]:a[k]-b[k]).slice(0,200)
   .map(m=>`<tr class="${m.id===current?'active':''}"><td class="id">${esc(m.id)}<br><span style="opacity:.5">${esc(m.name)}</span></td>
     <td class="num">${(m.context/1000).toFixed(0)}k</td><td class="num">${m.prompt_1m.toFixed(2)}</td><td class="num">${m.completion_1m.toFixed(2)}</td>
     <td>${m.id===current?'✓ 使用中':`<button class="act" onclick="pick('${m.id}')">启用</button>`}</td></tr>`).join("");}
async function pick(id){const r=await fetch("/api/config",{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({model:id})});
  if(!r.ok){toast("❌ "+(await r.json()).detail);return;}toast("✅ 已切换："+id);await loadCfg();renderModels();}
$("mq").oninput=renderModels;$("msort").onchange=renderModels;

/* ---- 访客查询 ---- */
async function doAsk(){const q=$("ask").value.trim();if(!q)return;const box=$("askAns");box.style.display="block";box.innerHTML="思考中…";
  const r=await fetch("/api/ask",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({question:q})});
  const d=await r.json();
  if(!r.ok){box.innerHTML="⚠️ "+esc(d.detail);return;}
  box.innerHTML=`<b>💬 ${esc(d.answer)}</b><details><summary>查看生成的 SQL 与 ${d.rows.length} 行结果</summary>
    <div class="mono" style="margin:6px 0">${esc(d.sql)}</div>
    <div class="mono" style="opacity:.7">${esc(JSON.stringify(d.rows.slice(0,8)))}</div></details>`;}
$("ask").addEventListener("keydown",e=>{if(e.key==="Enter")doAsk();});
async function loadStats(){const s=await(await fetch("/api/stats")).json();
  $("stats").innerHTML=`<div class="kpi"><b>${s.total}</b>累计访问</div><div class="kpi"><b>${s.this_week}</b>近7天</div>
    <div class="kpi"><b style="font-size:1.1rem">${s.peak_hour||'-'}</b>峰值时段</div>
    <div class="kpi"><b style="font-size:1rem">${esc((s.top_visitors[0]||{}).visitor_name||'-')}</b>回访之王 ${(s.top_visitors[0]||{}).visit_count||0}次</div>`;
  loadVisits();}
async function loadVisits(){const q=encodeURIComponent($("vq").value.trim());
  const d=await(await fetch("/api/visits?limit=50&q="+q)).json();
  $("vrows").innerHTML=d.visits.map(v=>`<tr><td class="mono">${esc((v.entered_at||'').replace('T',' ').slice(0,16))}</td>
    <td class="mono">${esc(v.plate)}</td><td>${esc(v.company)}</td><td>${esc(v.purpose)}</td><td>${esc(v.visitor_name||'')}</td><td class="mono">${esc(v.phone)}</td></tr>`).join("")
    ||'<tr><td colspan=6 style="opacity:.5">无记录</td></tr>';}
$("vq").oninput=()=>{clearTimeout(window._vt);window._vt=setTimeout(loadVisits,250);};

/* ---- Trace ---- */
async function loadCalls(){const d=await(await fetch("/api/calls")).json();
  $("callsel").innerHTML=d.calls.length?d.calls.map(c=>`<option value="${c.call_id}">${c.call_id} (${c.events}事件)</option>`).join(""):'<option>暂无 trace</option>';
  if(d.calls.length)loadTrace(d.calls[0].call_id);}
async function loadTrace(cid){if(!cid)return;const d=await(await fetch("/api/traces/"+cid)).json();
  $("tl").innerHTML=d.trace.map(e=>{const lat=e.latency_ms?`<span class="lat">${e.latency_ms}ms</span> `:"";
    const tool=e.tool_name?`[${esc(e.tool_name)}] `:"";const t=e.turn_index!=null?`t${e.turn_index}`:"  ";
    return `<span class="ev-${e.event_type}">${t} ${e.event_type.padEnd(14)} ${tool}${lat}${esc((e.content||'').replace(/\n/g,' ').slice(0,90))}</span>`;}).join("\n");}

/* ---- 门卫台（多轮 + HITL 确认 + 流式输出）---- */
let chatMsgs = [], chatBusy = false, chatTyper = null;
function stopTyper(){ if(chatTyper){ clearInterval(chatTyper); chatTyper=null; } }
function chatBubbles(){ return chatMsgs.filter(m => (m.role==="user"||m.role==="assistant") && m.content); }
function confirmCard(p){ return `<div class="confirm"><b>⚠️ 待确认写操作</b><br>${esc(p.summary)}
    <div class="btns"><button class="yes" onclick="chatConfirm(true)">确认执行</button>
    <button class="no" onclick="chatConfirm(false)">取消</button></div></div>`; }
function chooseCard(c){
  const opts = (c.options||[]).map(o => `<button class="opt" onclick="chatChoose(${o.id})">
    <span class="opt-name">${esc(o.visitor_name||'（未留名）')}</span>
    <span class="opt-sub">📱 ${esc(o.phone||'—')} · 🚗 ${esc(o.plates||'—')} · 共 ${o.visit_count||0} 次</span></button>`).join("");
  return `<div class="choose"><b>🤔 ${esc(c.question||'您指的是哪一位？')}</b><div class="opts">${opts}</div></div>`;
}
function renderChat(pending, streamLast, choose){
  stopTyper();
  const log = $("chatlog"), bubbles = chatBubbles();
  let stream = null, statics = bubbles;
  if (streamLast && bubbles.length && bubbles[bubbles.length-1].role==="assistant"){
    stream = bubbles[bubbles.length-1]; statics = bubbles.slice(0,-1);
  }
  let html = statics.map(m => `<div class="msg ${m.role==="user"?"u":"a"}">${esc(m.content)}</div>`).join("");
  if (stream) html += `<div class="msg a cursor" id="streaming"></div>`;
  if (pending) html += confirmCard(pending);
  if (choose) html += chooseCard(choose);
  log.innerHTML = html; log.scrollTop = log.scrollHeight;
  if (stream) typewrite($("streaming"), stream.content, log);
}
function typewrite(el, text, log){
  const step = Math.max(1, Math.ceil(text.length/70)); let i = 0;
  chatTyper = setInterval(()=>{
    i += step; el.textContent = text.slice(0, i); log.scrollTop = log.scrollHeight;
    if (i >= text.length){ stopTyper(); el.classList.remove("cursor"); el.textContent = text; }
  }, 24);
}
function showTyping(){
  const log = $("chatlog");
  log.insertAdjacentHTML("beforeend", '<div class="typing" id="typing"><i></i><i></i><i></i></div>');
  log.scrollTop = log.scrollHeight;
}
async function chatPost(body, stream){
  chatBusy = true;
  try {
    const r = await fetch("/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    let d = {}; try { d = await r.json(); } catch(e){}      // 500 可能返回非 JSON，别让它抛
    if(!r.ok){ toast("❌ "+(d.detail||("出错 "+r.status))); renderChat(null); return; }
    chatMsgs = d.messages || chatMsgs;
    if (d.type==="confirm") renderChat(d.action, false, null);
    else if (d.type==="choose") renderChat(null, false, d);
    else renderChat(null, stream, null);
  } catch(e){                                               // 网络错误也要清掉"正在输入"，永不卡死
    toast("❌ 网络错误，请重试"); renderChat(null);
  } finally { chatBusy = false; }
}
async function chatSend(){
  if(chatBusy) return;
  const q = $("chatin").value.trim(); if(!q) return;
  $("chatin").value = "";
  chatMsgs.push({role:"user", content:q});
  renderChat(null); showTyping();
  await chatPost({messages: chatMsgs}, true);
}
async function chatConfirm(ok){ if(chatBusy) return; stopTyper(); showTyping(); await chatPost({messages: chatMsgs, confirm: ok}, true); }
async function chatChoose(id){ if(chatBusy) return; stopTyper(); showTyping(); await chatPost({messages: chatMsgs, choice: id}, true); }
$("chatin").addEventListener("keydown",e=>{if(e.key==="Enter")chatSend();});

/* ---- 值守台（实时 feed）---- */
let feedTimer=null, feedSeen=new Set(), feedPrimed=false, phoneTimer=null;
function stopFeed(){ if(feedTimer){clearInterval(feedTimer);feedTimer=null;} }
function startFeed(){ stopFeed(); loadFeed(); feedTimer=setInterval(loadFeed,3000); }
async function doRelease(id){ try{ await fetch("/api/release",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({visit_id:id})}); toast("✅ 已放行"); loadFeed(); }catch(e){ toast("❌ 放行失败"); } }
async function manualRelease(){ try{ await fetch("/api/release",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({})}); toast("🔓 已手动放行（占位）"); }catch(e){ toast("❌ 失败"); } }
function fmtPhone(n){ const m=String(n).match(/^\+1(\d{3})(\d{3})(\d{4})$/); return m?`+1 ${m[1]}-${m[2]}-${m[3]}`:n; }
async function loadPhone(){ try{ const d=await(await fetch("/api/phone")).json(); $("phonenum").textContent=d.number?fmtPhone(d.number):"（未获取）"; }catch(e){} }
async function loadFeed(){
  let d; try{ d=await(await fetch("/api/feed?limit=24")).json(); }catch(e){ return; }
  const now=Date.now();
  $("feedcards").innerHTML = (d.visits||[]).map(v=>{
    const t = v.entered_at ? new Date(String(v.entered_at).replace(' ','T')) : null;
    const ageMs = t ? now-t.getTime() : 1e12;
    const justNew = feedPrimed && !feedSeen.has(v.id);   // 首屏不animate；之后只有新卡片弹
    feedSeen.add(v.id);
    const sla = v.elapsed_s!=null ? `<span class="sla ${v.elapsed_s>25?'slow':''}">⏱ ${(+v.elapsed_s).toFixed(1)}s</span>` : '';
    const pending = !v.released;
    const badge = pending ? '<span class="badge-pending">🔔 请放行</span>' : (ageMs<90000?'<span class="badge-new">新到</span>':'');
    const rel = pending ? `<div class="rel"><button onclick="doRelease(${v.id})">🔓 放行</button></div>` : '<div class="released">✓ 已放行</div>';
    return `<div class="fcard ${justNew?'fresh':''} ${pending?'pending':''}">${badge}
      <div class="plate">🚗 ${esc(v.plate)||'—'}</div>
      <div class="who">${esc(v.visitor_name||'访客')}</div>
      <div class="meta">${esc(v.company)} · ${esc(v.purpose)}<br>${esc(v.phone)}</div>
      <div class="foot"><span>${t?t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):''}</span>${sla}</div>
      ${rel}
    </div>`;
  }).join("") || '<div style="opacity:.5">暂无登记记录。司机拨号完成登记后，卡片会在这里实时出现并请求放行。</div>';
  feedPrimed = true;
}

/* ---- 鉴权闸门（TOTP + 会话）---- */
let ME = null;
async function api(path, opts){ const r=await fetch(path, opts); let d={}; try{d=await r.json();}catch(e){} if(!r.ok) throw new Error(d.detail||('HTTP '+r.status)); return d; }
function gate(html){ $("gate").hidden=false; $("app").hidden=true; $("userbar").hidden=true; $("gate").innerHTML=html; }

async function init(){
  const s = await (await fetch("/api/me")).json();
  ME = s.user;
  if (ME) return showApp();
  if (s.setup_needed) return showSetup();
  showLogin();
}
function showLogin(){
  gate(`<div class="authcard"><h2>门卫台登录</h2><div style="opacity:.6;font-size:.85rem">用户名 + 验证器 6 位码</div>
    <input id="lu" placeholder="用户名" autocomplete="username">
    <input id="lc" placeholder="6 位验证码" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
    <div class="autherr" id="lerr"></div><button onclick="doLogin()">登录</button></div>`);
  $("lc").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}
async function doLogin(){
  try{ await api("/api/login",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({username:$("lu").value.trim(), code:$("lc").value.trim()})}); await init(); }
  catch(e){ $("lerr").textContent=e.message; }
}
function showSetup(){
  gate(`<div class="authcard"><h2>首次初始化</h2><div style="opacity:.6;font-size:.85rem">创建根管理员并绑定验证器</div>
    <input id="su" value="Admin"><div class="autherr" id="serr"></div>
    <button onclick="doSetup()">生成二维码</button><div id="setupqr"></div></div>`);
}
async function doSetup(){
  try{ const d=await api("/api/setup",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({username:$("su").value.trim()||"Admin"})});
    $("setupqr").innerHTML=`<img class="qr" src="${d.qr}"><div class="hint">用 Apple 密码 / Google Authenticator 扫码，然后用 <b>${esc(d.username)}</b> + 6 位码登录</div><button onclick="showLogin()">去登录</button>`;
    $("su").disabled=true;
  }catch(e){ $("serr").textContent=e.message; }
}
function showApp(){
  $("gate").hidden=true; $("app").hidden=false; $("userbar").hidden=false;
  $("userbar").innerHTML=`· ${esc(ME.username)}${ME.role==="root"?" (root)":""} · <a href="#" onclick="doLogout();return false" style="color:seagreen">登出</a>`;
  $("tab-admins").hidden = ME.role!=="root";
  loadCfg().then(loadModels);
  loadPhone(); if(!phoneTimer) phoneTimer=setInterval(loadPhone,60000);
  startFeed();               // 值守台是默认首页
}
async function doLogout(){ try{await fetch("/api/logout",{method:"POST"});}catch(e){} ME=null; stopFeed(); if(phoneTimer){clearInterval(phoneTimer);phoneTimer=null;} showLogin(); }

/* ---- 账号管理（root）---- */
async function loadAdmins(){
  try{
    const d=await api("/api/admins");
    $("adminrows").innerHTML=d.admins.map(a=>`<tr><td>${esc(a.username)}</td><td>${esc(a.role)}</td>
      <td>${a.active?'✅':'⛔'}</td><td>${a.role==="root"?'':`<button class="act" onclick="toggleAdmin('${esc(a.username)}',${!a.active})">${a.active?'停用':'启用'}</button>`}</td></tr>`).join("");
    const s=await api("/api/sessions");
    $("sessrows").innerHTML=s.sessions.map(x=>`<tr><td>${esc(x.username)}</td>
      <td class="mono">${esc((x.created_at||'').replace('T',' ').slice(0,16))}</td>
      <td class="mono">${esc((x.expires_at||'').replace('T',' ').slice(0,16))}</td>
      <td><button class="act" onclick="revokeSess('${esc(x.token)}')">踢下线</button></td></tr>`).join("");
  }catch(e){ toast("❌ "+e.message); }
}
async function createAdmin(){
  const u=$("newadmin").value.trim(); if(!u) return;
  try{ const d=await api("/api/admins",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({username:u})});
    $("newqr").innerHTML=`<div class="card">新账号 <b>${esc(d.username)}</b> 的二维码（让本人扫码入验证器）：<br><img class="qr" src="${d.qr}"></div>`;
    $("newadmin").value=""; loadAdmins();
  }catch(e){ toast("❌ "+e.message); }
}
async function toggleAdmin(u,active){ try{ await api("/api/admins/active",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({username:u,active})}); loadAdmins(); }catch(e){ toast("❌ "+e.message); } }
async function revokeSess(t){ try{ await api("/api/sessions/revoke",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({token:t})}); loadAdmins(); }catch(e){ toast("❌ "+e.message); } }

init();
</script>
