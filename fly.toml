# AgentGuard — Fly.io 部署配置
# app 名首次 `fly launch` 时定；region iad = 美东，与 Neon(us-east-1)/Vapi/OpenRouter 同区，延迟最优。
app = "agentguard-yj"
primary_region = "iad"

[build]

# 公网服务：custom-llm 代理 + Vapi 工具端点。常温单机(min=1)，语音路径不吃冷启动。
[http_service]
  internal_port = 8200
  force_https = true
  auto_stop_machines = false      # 不休眠——避免第一句撞冷启动
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

# 健康检查打 /health
[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# 注：admin console(8100) 不对公网暴露——本地用 `fly proxy 8100:8100` 私有访问，
# 契合"访客 PII 不裸奔"的边界(决策：admin 私有 + Basic Auth)。
