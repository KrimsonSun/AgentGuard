# AgentGuard — Fly.io 部署配置（单机跑两进程，两个公网服务）
# region iad = 美东，与 Neon(us-east-1)/Vapi/OpenRouter 同区，延迟最优。
app = "agentguard-yj"
primary_region = "iad"

[build]

# 服务1：custom-llm 代理 + Vapi 工具端点（公网 443，Vapi 打这里）
[[services]]
  internal_port = 8200
  protocol = "tcp"
  auto_stop_machines = false          # 不休眠——语音路径不吃冷启动
  auto_start_machines = true
  min_machines_running = 1
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

# 服务2：门卫台 console（公网 8443，TOTP 2FA 保护——PII/写操作只对已登录者开放）
[[services]]
  internal_port = 8100
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  [[services.ports]]
    port = 8443
    handlers = ["tls", "http"]
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
